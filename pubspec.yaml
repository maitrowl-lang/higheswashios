name: higheswashios
description: "On-demand laundry booking app with merchant bidding, real-time tracking, and messaging."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Networking & API
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path: ^1.8.3

  # Database
  supabase_flutter: ^1.10.0

  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  google_sign_in: ^6.2.0

  # UI & Navigation
  go_router: ^12.1.0
  flutter_animate: ^4.2.0

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # Location & Maps
  geolocator: ^9.0.2
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.0

  # Real-time & Messaging
  firebase_messaging: ^14.7.0
  socket_io_client: ^2.0.0

  # Date & Time
  intl: ^0.19.0

  # HTTP Client
  uuid: ^4.0.0
  logger: ^2.1.0

  # Payment
  flutter_stripe: ^9.7.0

  # Camera
  camera: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
